<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="botGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cartGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a1a" stroke="url(#botGradient)" stroke-width="3"/>
  
  <!-- Android Robot Body -->
  <rect x="55" y="70" width="90" height="75" rx="20" fill="url(#botGradient)"/>
  
  <!-- Robot Head -->
  <rect x="65" y="40" width="70" height="50" rx="25" fill="url(#botGradient)"/>
  
  <!-- Antenna -->
  <line x1="85" y1="40" x2="75" y2="20" stroke="url(#botGradient)" stroke-width="4" stroke-linecap="round"/>
  <line x1="115" y1="40" x2="125" y2="20" stroke="url(#botGradient)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="75" cy="20" r="4" fill="#10b981"/>
  <circle cx="125" cy="20" r="4" fill="#10b981"/>
  
  <!-- Robot Eyes -->
  <circle cx="85" cy="65" r="8" fill="#0a0a0a"/>
  <circle cx="115" cy="65" r="8" fill="#0a0a0a"/>
  <circle cx="87" cy="63" r="3" fill="#ffffff"/>
  <circle cx="117" cy="63" r="3" fill="#ffffff"/>
  
  <!-- Digital Books Stack -->
  <rect x="125" y="95" width="35" height="8" rx="2" fill="#f59e0b" filter="url(#glow)"/>
  <rect x="127" y="88" width="31" height="8" rx="2" fill="#10b981" filter="url(#glow)"/>
  <rect x="129" y="81" width="27" height="8" rx="2" fill="#ef4444" filter="url(#glow)"/>
  
  <!-- Book Digital Lines Effect -->
  <line x1="130" y1="99" x2="150" y2="99" stroke="#0a0a0a" stroke-width="1" opacity="0.5"/>
  <line x1="132" y1="92" x2="150" y2="92" stroke="#0a0a0a" stroke-width="1" opacity="0.5"/>
  <line x1="134" y1="85" x2="148" y2="85" stroke="#0a0a0a" stroke-width="1" opacity="0.5"/>
  
  <!-- Shopping Cart Handle -->
  <path d="M 45 90 L 25 90 L 25 80" stroke="url(#cartGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Shopping Cart Body -->
  <path d="M 25 90 L 35 120 L 55 120" stroke="url(#cartGradient)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="30" y1="100" x2="52" y2="100" stroke="url(#cartGradient)" stroke-width="2" opacity="0.5"/>
  <line x1="32" y1="110" x2="54" y2="110" stroke="url(#cartGradient)" stroke-width="2" opacity="0.5"/>
  
  <!-- Shopping Cart Wheel -->
  <circle cx="35" cy="128" r="5" fill="#0a0a0a" stroke="url(#cartGradient)" stroke-width="2"/>
  <circle cx="50" cy="128" r="5" fill="#0a0a0a" stroke="url(#cartGradient)" stroke-width="2"/>
  
  <!-- Robot Arms -->
  <path d="M 55 85 Q 40 95 45 110" stroke="url(#botGradient)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 145 85 Q 160 95 155 110" stroke="url(#botGradient)" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Shopping Sparkles -->
  <circle cx="30" cy="75" r="2" fill="#f59e0b">
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="70" r="2" fill="#10b981">
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="100" r="1.5" fill="#6366f1">
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>