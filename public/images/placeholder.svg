<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#1a1a25"/>
  <rect width="400" height="300" fill="url(#grad1)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.1"/>
  </pattern>
  <rect width="400" height="300" fill="url(#grid)"/>
  
  <!-- Center icon -->
  <g transform="translate(160, 110)">
    <!-- Document shape -->
    <rect x="10" y="5" width="60" height="70" rx="4" fill="none" stroke="url(#grad2)" stroke-width="2"/>
    <path d="M20 25 L60 25 M20 40 L60 40 M20 55 L45 55" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Download arrow -->
    <circle cx="55" cy="65" r="15" fill="url(#grad2)"/>
    <path d="M55 58 L55 72 M55 72 L49 66 M55 72 L61 66" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6366f1" opacity="0.8">
    Digital Product
  </text>
</svg>