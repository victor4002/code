<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="template-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="template-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="#1a1a25"/>
  <rect width="400" height="300" fill="url(#template-grad)"/>
  
  <!-- Template/layout icon -->
  <g transform="translate(130, 60)">
    <!-- Browser window -->
    <rect x="10" y="10" width="120" height="100" rx="6" fill="none" stroke="url(#template-accent)" stroke-width="2"/>
    <!-- Browser header -->
    <rect x="10" y="10" width="120" height="20" rx="6" fill="url(#template-accent)" opacity="0.2"/>
    <circle cx="22" cy="20" r="3" fill="#8b5cf6"/>
    <circle cx="32" cy="20" r="3" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="42" cy="20" r="3" fill="#8b5cf6" opacity="0.3"/>
    <!-- Layout grid lines -->
    <line x1="20" y1="45" x2="120" y2="45" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <line x1="20" y1="65" x2="100" y2="65" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="20" y1="85" x2="80" y2="85" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
    <!-- Sidebar -->
    <rect x="15" y="40" width="25" height="65" rx="2" fill="#8b5cf6" opacity="0.15"/>
  </g>
  
  <text x="200" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b5cf6" opacity="0.8">Template</text>
</svg>