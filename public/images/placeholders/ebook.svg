<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ebook-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="ebook-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="100%" style="stop-color:#8b5cf6" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="#1a1a25"/>
  <rect width="400" height="300" fill="url(#ebook-grad)"/>
  
  <!-- Book icon -->
  <g transform="translate(140, 70)">
    <!-- Book cover -->
    <rect x="10" y="10" width="100" height="140" rx="4" fill="none" stroke="url(#ebook-accent)" stroke-width="2.5"/>
    <!-- Pages -->
    <path d="M20 20 L100 20 L100 140 L20 140" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <!-- Book spine lines -->
    <line x1="30" y1="20" x2="30" y2="140" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
    <!-- Title lines -->
    <line x1="45" y1="50" x2="90" y2="50" stroke="url(#ebook-accent)" stroke-width="3" stroke-linecap="round"/>
    <line x1="45" y1="70" x2="80" y2="70" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="45" y1="85" x2="75" y2="85" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- E icon -->
    <text x="60" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="url(#ebook-accent)">e</text>
  </g>
  
  <text x="200" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6366f1" opacity="0.8">eBook</text>
</svg>